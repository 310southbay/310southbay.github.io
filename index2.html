<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>310 Southbay | Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 768px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .image-block img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .banner {
            width: 100%;
        }

        .inserted-gif {
            width: 100%;
            border-radius: 4px;
        }

        .content-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-block banner">
            <img src="https://onuniverse-assets.imgix.net/D714AEA0-C0BA-4837-9746-C1A24C8E268B?w=1500&auto=compress,format" alt="310 Southbay Banner">
        </div>

        <div class="image-block">
            <img class="inserted-gif" src="https://media4.giphy.com/media/JeHPn7VUQZAD2mBwLF/giphy.gif" alt="Southbay Animation">
        </div>

        <div class="content-grid">
            <div class="image-block">
                <img src="https://onuniverse-assets.imgix.net/A457DA59-1412-4876-B6FB-8C7F633577FA?w=750&auto=compress,format" alt="Content Detail">
            </div>

            <div class="image-block">
                <img src="https://onuniverse-assets.imgix.net/6AE50F72-0515-4BC0-9AC3-C628D53D2D03?w=1500&auto=compress,format" alt="Main Brand Image">
            </div>
        </div>
    </div>

</body>
</html>
