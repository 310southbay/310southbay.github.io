<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>310 South Bay | Established</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            color: #ffffff;
            font-family: 'Arial Black', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 90%;
            padding: 20px;
        }

        .header-logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 40px;
            /* Initial shadow state */
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.2));
            /* Link to the animation below */
            animation: pulse 4s infinite ease-in-out;
        }

        /* The slow pulsing red glow animation */
        @keyframes pulse {
            0% {
                filter: drop-shadow(0 0 5px rgba(200, 0, 0, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.7));
            }
            100% {
                filter: drop-shadow(0 0 5px rgba(200, 0, 0, 0.3));
            }
        }

        .bold-phrase {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .sub-phrase {
            font-size: 1.2rem;
            color: #888888;
            font-weight: normal;
            margin-bottom: 40px;
        }

        .contact-info {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: #555555;
        }

        .contact-info a {
            color: #d1d1d1;
            text-decoration: none;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="MagicEraser_260417_233536.png" alt="310 South Bay Logo" class="header-logo">

        <div class="bold-phrase">
            SOMETHING IS BEING BUILT.
        </div>
        <div class="sub-phrase">
            NOT FOR EVERYONE.
        </div>

        <div class="contact-info">
            INQUIRIES: <a href="mailto:info@310southbay.com">INFO@310SOUTHBAY.COM</a>
        </div>
    </div>

</body>
</html>
