<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>310 South Bay | Established in the South Bay</title>
    <style>
        body {
            /* Black background to make the dark metallic logo pop */
            background-color: #000000;
            margin: 0;
            padding: 0;
            color: #ffffff;
            font-family: 'Arial Black', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            letter-spacing: 0.1em;
        }

        .container {
            max-width: 90%;
            padding: 20px;
        }

        .header-logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 30px; /* Space below the logo */
        }

        .status-text {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #d1d1d1; /* Slight grey to keep it looking like metal/pewter */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            line-height: 1.6;
        }

        .bold-phrase {
            font-size: 1.8rem;
            color: #ffffff;
            margin-top: 20px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }

        .contact-info {
            font-size: 0.9rem;
            font-weight: normal;
            margin-top: 40px;
            color: #aaaaaa;
        }

        .contact-info a {
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
        }

        .contact-info a:hover {
            color: #d1d1d1;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/VDPB7wZ/310-South-Bay-Logo.png" alt="310 South Bay Logo" class="header-logo">

        <div class="status-text">
            Establishment in progress.
            <div class="bold-phrase">
                Something is being built.<br>
                NOT FOR EVERYONE.
            </div>
        </div>

        <div class="contact-info">
            INQUIRIES: <a href="mailto:info@310southbay.com">INFO@310SOUTHBAY.COM</a>
        </div>
    </div>

</body>
</html>
